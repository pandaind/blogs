{{ define "main" }}
<div class="notes-page">
  <div class="notes-header">
    <a href="{{ "/thoughts/" | relURL }}" class="notes-back-link">
      <i class="fas fa-arrow-left"></i> Back to MicroThoughts
    </a>
  </div>

  <div class="timeline single-note">
    <div class="timeline-item">
      <div class="timeline-dot">
        {{- with .Params.emoji }}
          <span class="dot-emoji">{{ . }}</span>
        {{- else }}
          <span class="dot-default"></span>
        {{- end }}
      </div>
      <div class="timeline-card">
        <div class="timeline-meta">
          <span class="timeline-date">
            <i class="far fa-calendar-alt"></i>
            {{ .Date.Format "January 02, 2006" }}
          </span>
          <span class="timeline-time">
            <i class="far fa-clock"></i>
            {{ .Date.Format "15:04" }}
          </span>
        </div>
        <div class="timeline-content">
          {{ .Content }}
        </div>
        {{- if .Params.tags }}
        <div class="timeline-tags">
          {{- range .Params.tags }}
          <a href="{{ "/tags/" | relURL }}{{ . | urlize }}/" class="note-tag">#{{ . }}</a>
          {{- end }}
        </div>
        {{- end }}
      </div>
    </div>
  </div>
</div>
{{ end }}
